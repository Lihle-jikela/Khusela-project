<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Logic Engine - Ticketing Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex overflow-hidden selection:bg-cyan-500/30">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col hidden md:flex shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-700">
            <div class="flex items-center gap-3 text-cyan-400 font-bold text-xl tracking-tight">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Nexus AI
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="#" class="flex items-center gap-3 px-3 py-2 bg-cyan-900/30 text-cyan-400 rounded-lg transition-colors border border-cyan-800/50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                All Tickets
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </a>
        </nav>
        <div class="p-4 border-t border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold shadow-lg shadow-cyan-500/20">
                    LJ
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-200">Lihle Jikela</p>
                    <p class="text-xs text-slate-400 border border-slate-600 px-1.5 py-0.5 rounded inline-block mt-0.5">Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Topbar (Mobile mainly, but acts as header) -->
        <header class="h-16 bg-slate-800/80 backdrop-blur border-b border-slate-700 flex items-center justify-between px-6 shrink-0 sticky top-0 z-10">
            <h1 class="text-xl font-semibold text-white">Support Dashboard</h1>
            <div class="flex gap-4 items-center">
                 <button onclick="clearAllTickets()" class="text-xs text-rose-400 hover:text-rose-300 transition-colors uppercase tracking-wider font-semibold">
                    Clear Tickets
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 space-y-8">
            
            <!-- Stats Row -->
            <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 shadow-sm relative overflow-hidden group">
                    <div class="absolute -right-6 -top-6 w-24 h-24 bg-cyan-500/10 rounded-full blur-2xl group-hover:bg-cyan-500/20 transition-all"></div>
                    <p class="text-slate-400 text-sm font-medium mb-1">Total Tickets</p>
                    <p class="text-3xl font-bold text-white tabular-nums" id="stat-total">0</p>
                </div>
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 shadow-sm relative overflow-hidden group">
                     <div class="absolute -right-6 -top-6 w-24 h-24 bg-rose-500/10 rounded-full blur-2xl group-hover:bg-rose-500/20 transition-all"></div>
                    <p class="text-slate-400 text-sm font-medium mb-1">Needs Review</p>
                    <p class="text-3xl font-bold text-white tabular-nums" id="stat-review">0</p>
                </div>
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 shadow-sm relative overflow-hidden group">
                     <div class="absolute -right-6 -top-6 w-24 h-24 bg-emerald-500/10 rounded-full blur-2xl group-hover:bg-emerald-500/20 transition-all"></div>
                    <p class="text-slate-400 text-sm font-medium mb-1">Resolved (AI)</p>
                    <p class="text-3xl font-bold text-white tabular-nums" id="stat-ai">0</p>
                </div>
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 shadow-sm relative overflow-hidden group">
                     <div class="absolute -right-6 -top-6 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-all"></div>
                    <p class="text-slate-400 text-sm font-medium mb-1">Avg Resolution</p>
                    <p class="text-3xl font-bold text-white"><span class="text-xl">~</span>1s</p>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Create Form -->
                <section class="lg:col-span-1">
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-sm sticky top-6">
                        <div class="flex items-center gap-2 mb-6">
                            <div class="w-8 h-8 rounded bg-cyan-500/20 flex items-center justify-center text-cyan-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </div>
                            <h2 class="text-lg font-semibold text-white">Create Ticket</h2>
                        </div>

                        <form id="ticket-form" class="space-y-4">
                            <div>
                                <label for="title" class="block text-sm font-medium text-slate-300 mb-1.5">Ticket Title</label>
                                <input type="text" id="title" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all shadow-inner" placeholder="E.g., Cannot access email">
                            </div>
                            
                            <div>
                                <label for="description" class="block text-sm font-medium text-slate-300 mb-1.5">Description</label>
                                <textarea id="description" required rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all shadow-inner resize-none" placeholder="Please describe your issue..."></textarea>
                            </div>

                            <div>
                                <label for="tone" class="block text-sm font-medium text-slate-300 mb-1.5">AI Response Tone</label>
                                <div class="relative">
                                    <select id="tone" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all appearance-none cursor-pointer">
                                        <option value="Formal">Formal</option>
                                        <option value="Friendly">Friendly</option>
                                        <option value="Urgent">Urgent</option>
                                    </select>
                                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-medium py-2.5 rounded-lg shadow-lg shadow-cyan-500/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-cyan-500 flex items-center justify-center gap-2 mt-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                Process Output
                            </button>
                        </form>
                    </div>
                </section>

                <!-- Recent Tickets List -->
                <section class="lg:col-span-2">
                     <div class="flex items-center gap-2 mb-6">
                        <div class="w-8 h-8 rounded bg-blue-500/20 flex items-center justify-center text-blue-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        </div>
                        <h2 class="text-lg font-semibold text-white">Recent Tickets & AI Output</h2>
                    </div>
                    
                    <div id="tickets-container" class="space-y-4">
                        <!-- Tickets dynamically injected here -->
                    </div>
                    
                    <!-- Empty State -->
                    <div id="empty-state" class="hidden bg-slate-800 border border-slate-700 border-dashed rounded-xl p-12 text-center">
                        <div class="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-700/50 text-slate-500">
                             <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <h3 class="text-lg font-medium text-slate-300 mb-1">No pending tickets</h3>
                        <p class="text-slate-500 text-sm max-w-sm mx-auto">Create a new ticket from the form and the Nexus AI will analyze it instantly.</p>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        // --- 1. State Management ---
        let tickets = [];

        // --- 2. Logic Functions ---
        const keywords = {
            IT: ['laptop', 'password', 'login', 'software', 'wifi', 'slow'],
            Finance: ['salary', 'invoice', 'pay', 'budget'],
            HR: ['leave', 'conflict', 'sick', 'policy'],
            Operations: ['cleaning', 'maintenance', 'desk']
        };

        function categorizeTicket(text) {
            const lowerText = text.toLowerCase();
            for (const [category, words] of Object.entries(keywords)) {
                if (words.some(word => lowerText.includes(word))) {
                    return category;
                }
            }
            return 'Needs Human Review';
        }

        function generateResponse(category, tone, text) {
            const lowerText = text.toLowerCase();
            let baseTemplate = '';
            
            // Templates based on tone and category
            if (tone === 'Formal') {
                baseTemplate = `Dear User,\n\nThank you for reaching out regarding your ${category} issue. Our automated systems have logged your request. We will begin processing this immediately.`;
            } else if (tone === 'Friendly') {
                baseTemplate = `Hi there! 👋\n\nThanks for letting us know about the ${category} matter. We've got it on our radar and are jumping on it right away. Hang tight!`;
            } else if (tone === 'Urgent') {
                baseTemplate = `URGENT ALERT: ${category.toUpperCase()} ISSUE LOGGED.\n\nImmediate escalation initiated. Support team has been notified.`;
            }

            if (category === 'Needs Human Review') {
                if(tone === 'Friendly') {
                    baseTemplate = `Hi! Thanks for the ticket. I couldn't quite categorize this automatically, so I've flagged it for one of our human experts to review ASAP!`;
                } else if(tone === 'Urgent') {
                    baseTemplate = `URGENT UNCLASSIFIED ISSUE. Escalating directly to human dispatch line.`;
                } else {
                    baseTemplate = `We have received your ticket. As it requires specific attention, it has been forwarded to our human review team for proper routing.`;
                }
            }

            // Contextual Helpful Tips
            let tip = '';
            if (category === 'IT' && lowerText.includes('slow')) {
                tip = "\n\n💡 Helpful Tip: To resolve slow laptop performance, please try the following steps:\n1. Restart your machine to clear memory.\n2. Check for and install any pending Windows Updates.\n3. Close unused background applications.\n4. Check your disk space (at least 10% free space is recommended).";
            } else if (category === 'IT' && (lowerText.includes('password') || lowerText.includes('login'))) {
                tip = "\n\n💡 Helpful Tip: If you are locked out, try using the self-service password reset portal at ad.company.internal/reset. Alternatively, ensure your Caps Lock is off and try logging in from an Incognito/Private window.";
            } else if (category === 'HR' && lowerText.includes('leave')) {
                tip = "\n\n💡 Helpful Tip: To apply for leave, please follow these steps:\n1. Log into the Employee Support Portal.\n2. Navigate to 'My Time' > 'Request Time Off'.\n3. Select your leave type and dates.\n4. Submit for manager approval. Approval usually takes 1-2 business days.";
            } else if (category === 'Finance' && lowerText.includes('invoice')) {
                tip = "\n\n💡 Helpful Tip: Please ensure the invoice includes a valid Purchase Order (PO) number and itemized costs to avoid processing delays. Invoices are typically processed within 5-7 business days.";
            } else if (category === 'Operations' && lowerText.includes('desk')) {
                 tip = "\n\n💡 Helpful Tip: Desk reassignments or maintenance requests usually require your specific floor manager's approval in the system first. Please CC them on your communications.";
            }

            return baseTemplate + tip;
        }

        // --- 3. UI Update Functions ---
        function getCategoryColor(category) {
            switch(category) {
                case 'IT': return 'bg-blue-500/10 text-blue-400 border-blue-500/20';
                case 'Finance': return 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';
                case 'HR': return 'bg-purple-500/10 text-purple-400 border-purple-500/20';
                case 'Operations': return 'bg-orange-500/10 text-orange-400 border-orange-500/20';
                default: return 'bg-rose-500/10 text-rose-400 border-rose-500/20';
            }
        }

        function getToneIcon(tone) {
            if(tone === 'Formal') return '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>';
            if(tone === 'Friendly') return '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            return '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = tickets.length;
            const reviewCount = tickets.filter(t => t.category === 'Needs Human Review').length;
            document.getElementById('stat-review').textContent = reviewCount;
            document.getElementById('stat-ai').textContent = tickets.length - reviewCount;
        }

        function render() {
            const container = document.getElementById('tickets-container');
            const emptyState = document.getElementById('empty-state');
            
            container.innerHTML = '';

            if (tickets.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                // Render tickets in reverse order (newest first)
                [...tickets].reverse().forEach(ticket => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 border border-slate-700 p-5 rounded-xl shadow-sm transition-all hover:border-slate-600 group relative";
                    
                    card.innerHTML = `
                        <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
                            <div>
                                <h3 class="font-semibold text-white text-lg mr-2">${ticket.title}</h3>
                                <p class="text-xs text-slate-500 mt-0.5">${new Date(ticket.timestamp).toLocaleString()}</p>
                            </div>
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border ${getCategoryColor(ticket.category)}">
                                ${ticket.category}
                            </span>
                        </div>
                        
                        <div class="mb-4">
                            <p class="text-slate-300 text-sm whitespace-pre-wrap">${ticket.description}</p>
                        </div>
                        
                        <div class="bg-slate-900/50 border border-slate-700 rounded-lg p-4 relative overflow-hidden">
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-cyan-500 to-blue-500"></div>
                            
                            <div class="flex items-center gap-2 mb-2 text-cyan-400 text-sm font-medium">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                AI Response generated
                                <span class="ml-auto inline-flex items-center gap-1 px-2 py-0.5 rounded bg-slate-800 text-xs text-slate-400 border border-slate-700">
                                    ${getToneIcon(ticket.tone)}
                                    ${ticket.tone}
                                </span>
                            </div>
                            
                            <p class="text-sm text-slate-300 whitespace-pre-wrap pl-1">${ticket.aiResponse}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
            updateStats();
        }

        function clearAllTickets() {
            if(confirm('Are you sure you want to clear all tickets?')) {
                tickets = [];
                localStorage.removeItem('nexus_tickets');
                render();
            }
        }

        // --- 4. Initialization & Event Listeners ---
        function init() {
            const saved = localStorage.getItem('nexus_tickets');
            if (saved) {
                try {
                    tickets = JSON.parse(saved);
                } catch(e) {
                    console.error("Failed to parse tickets", e);
                    tickets = [];
                }
            }
            render();

            document.getElementById('ticket-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const title = document.getElementById('title').value;
                const description = document.getElementById('description').value;
                const tone = document.getElementById('tone').value;
                const combinedText = title + " " + description;
                
                const category = categorizeTicket(combinedText);
                const aiResponse = generateResponse(category, tone, combinedText);

                const newTicket = {
                    id: Date.now().toString(),
                    title,
                    description,
                    tone,
                    category,
                    aiResponse,
                    timestamp: new Date().toISOString()
                };

                tickets.push(newTicket);
                localStorage.setItem('nexus_tickets', JSON.stringify(tickets));
                
                // Clear inputs
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('tone').value = 'Formal'; // reset to default
                
                render();
            });
        }

        // Run when DOM loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
